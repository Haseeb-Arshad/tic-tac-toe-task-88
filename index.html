<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A polished tic-tac-toe game with player-vs-player and player-vs-computer modes."
    />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="game-title">
      <header class="app__header">
        <h1 id="game-title">Tic-Tac-Toe</h1>
        <p class="app__subtitle">Pick a mode, choose difficulty, and play instantly.</p>
      </header>

      <section class="panel panel--controls" aria-label="Game controls">
        <div class="field-group">
          <label for="modeSelect">Mode</label>
          <select id="modeSelect" name="mode">
            <option value="ai" selected>Player vs AI</option>
            <option value="pvp">Player vs Player</option>
          </select>
        </div>

        <div class="field-group" id="difficultyGroup">
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect" name="difficulty">
            <option value="easy">Easy (Random)</option>
            <option value="medium" selected>Medium (Strategic)</option>
            <option value="hard">Hard (Unbeatable)</option>
          </select>
        </div>

        <div class="button-row">
          <button id="newRoundBtn" type="button">New Round</button>
          <button id="resetMatchBtn" type="button">Reset Match</button>
        </div>
      </section>

      <section class="panel panel--status" aria-live="polite" aria-atomic="true">
        <p id="statusMessage">Loading game…</p>
        <p id="roundLabel">Round 1</p>
      </section>

      <section class="panel panel--scores" aria-label="Scoreboard">
        <h2>Scoreboard</h2>
        <ul class="scores">
          <li>
            <span id="scoreXLabel">Player X</span>
            <strong id="scoreX">0</strong>
          </li>
          <li>
            <span id="scoreOLabel">Computer (O)</span>
            <strong id="scoreO">0</strong>
          </li>
          <li>
            <span>Draws</span>
            <strong id="scoreDraws">0</strong>
          </li>
        </ul>
      </section>

      <section class="panel panel--board" aria-label="Tic-tac-toe board">
        <div class="board" id="gameBoard" role="grid" aria-label="3 by 3 tic-tac-toe board">
          <button class="cell" type="button" role="gridcell" data-index="0" aria-label="Cell 1"></button>
          <button class="cell" type="button" role="gridcell" data-index="1" aria-label="Cell 2"></button>
          <button class="cell" type="button" role="gridcell" data-index="2" aria-label="Cell 3"></button>
          <button class="cell" type="button" role="gridcell" data-index="3" aria-label="Cell 4"></button>
          <button class="cell" type="button" role="gridcell" data-index="4" aria-label="Cell 5"></button>
          <button class="cell" type="button" role="gridcell" data-index="5" aria-label="Cell 6"></button>
          <button class="cell" type="button" role="gridcell" data-index="6" aria-label="Cell 7"></button>
          <button class="cell" type="button" role="gridcell" data-index="7" aria-label="Cell 8"></button>
          <button class="cell" type="button" role="gridcell" data-index="8" aria-label="Cell 9"></button>
        </div>
      </section>
    </main>
  </body>
</html>
